name: Deploy backend to Hetzner

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/koryxa/backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: innovaplus-backend
      RSYNC_SOURCE: apps/koryxa/backend/
      REMOTE_ROOT: ${{ secrets.DEPLOY_PATH }}
      REMOTE_VENV: ${{ secrets.DEPLOY_PATH }}/.venv
      REQUIREMENTS_FILE: ${{ secrets.DEPLOY_PATH }}/requirements.txt
      HEALTHCHECK_URL: http://127.0.0.1:8000/health
      HEALTHCHECK_INTERVAL: "5"
      HEALTHCHECK_TIMEOUT: "180"
      SSH_OPTS: "-o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i ~/.ssh/id_ed25519"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          install -m 600 -D /dev/stdin ~/.ssh/id_ed25519 <<'KEY'
          ${{ secrets.HETZNER_SSH_KEY }}
          KEY
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure remote path exists
        run: |
          ssh ${{ env.SSH_OPTS }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "mkdir -p '${{ env.REMOTE_ROOT }}'"


      - name: Push code to server (protect .venv and .env)
        run: |
          rsync -az --delete \
            -e "ssh ${{ env.SSH_OPTS }}" \
            --filter='P .venv/' \
            --filter='P .env' \
            --exclude='models/***' \
            --exclude='.git/' \
            --exclude='__pycache__/' \
            ${{ env.RSYNC_SOURCE }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.REMOTE_ROOT }}/


      - name: Install/Update Python deps in remote venv
        run: |
          ssh ${{ env.SSH_OPTS }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            <<'EOF'
          set -e
          REMOTE_VENV="${{ env.REMOTE_VENV }}"
          REQUIREMENTS_FILE="${{ env.REQUIREMENTS_FILE }}"
          if [ ! -x "${REMOTE_VENV}/bin/python" ]; then
            python3 -m venv "${REMOTE_VENV}"
          fi
          "${REMOTE_VENV}/bin/python" -m pip install -U pip wheel
          "${REMOTE_VENV}/bin/pip" install -r "${REQUIREMENTS_FILE}" --no-cache-dir
          EOF

      - name: Restart service
        run: |
          ssh ${{ env.SSH_OPTS }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            <<'EOF'
          set -euo pipefail
          SERVICE_NAME="${{ env.SERVICE_NAME }}"
          DEPLOY_ROOT="${{ env.REMOTE_ROOT }}"
          export DEPLOY_ROOT
          sudo systemctl daemon-reload
          sudo systemctl restart "${SERVICE_NAME}"
          sudo systemctl is-active --quiet "${SERVICE_NAME}"
          sudo systemctl status "${SERVICE_NAME}" --no-pager
          EOF

      - name: Validate backend health endpoint
        run: |
          set -euo pipefail
          SERVICE_NAME="${{ env.SERVICE_NAME }}"
          HEALTH_URL="${{ env.HEALTHCHECK_URL }}"
          INTERVAL=${{ env.HEALTHCHECK_INTERVAL }}
          TIMEOUT=${{ env.HEALTHCHECK_TIMEOUT }}
          if ! command -v jq >/dev/null; then
            echo "::group::Installing jq for health validation"
            sudo apt-get update
            sudo apt-get install -y jq
            echo "::endgroup::"
          fi
          deadline=$((SECONDS + TIMEOUT))
          attempt=1
          last_response=""
          while [ $SECONDS -lt $deadline ]; do
            echo "Health attempt ${attempt}..."
            response=$(ssh ${{ env.SSH_OPTS }} \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "curl -fsS --max-time 10 '${HEALTH_URL}'" || true)
            last_response="${response}"
            status=$(printf '%s' "${response}" | jq -r '.status // empty' 2>/dev/null || true)
            if [ "${status}" = "ok" ]; then
              echo "Health check succeeded on attempt ${attempt}."
              exit 0
            fi
            sleep "${INTERVAL}"
            attempt=$((attempt + 1))
          done

          echo "::error::Health endpoint did not report status==ok within timeout."
          echo "Last response from ${HEALTH_URL}:"
          printf '%s\n' "${last_response}"

          echo "::group::Recent service logs"
          ssh ${{ env.SSH_OPTS }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo journalctl -u '${SERVICE_NAME}' -n 200 --no-pager || true"
          echo "::endgroup::"
          exit 1

      - name: Validate public product routes
        run: |
          set -euo pipefail
          OPENAPI_URL="https://innovaplus.africa/innova/api/openapi.json"
          spec=$(curl -fsS --max-time 20 "${OPENAPI_URL}")
          required_paths=("/trajectoire/onboarding"
            "/products/public"
            "/enterprise/needs"
            "/enterprise/opportunities/public"
          )
          missing=0
          for path in "${required_paths[@]}"; do
            if ! printf '%s' "${spec}" | jq -e --arg path "${path}" '.paths[$path]' >/dev/null; then
              echo "::error::Missing public route in deployed OpenAPI: ${path}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi
