name: Supabase Keepalive

on:
  schedule:
    # Every 12 hours to prevent inactivity pause.
    - cron: "17 */12 * * *"
  workflow_dispatch:

jobs:
  wakeup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "psycopg2-binary==2.9.9"

      - name: Wake Supabase Postgres
        env:
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python - <<'PY'
          import os
          import psycopg2

          required = [
              "SUPABASE_DB_HOST",
              "SUPABASE_DB_PORT",
              "SUPABASE_DB_NAME",
              "SUPABASE_DB_USER",
              "SUPABASE_DB_PASSWORD",
          ]

          missing = [key for key in required if not os.environ.get(key)]
          if missing:
              raise RuntimeError(f"Missing GitHub secrets: {', '.join(missing)}")

          conn = psycopg2.connect(
              host=os.environ["SUPABASE_DB_HOST"],
              port=int(os.environ["SUPABASE_DB_PORT"]),
              dbname=os.environ["SUPABASE_DB_NAME"],
              user=os.environ["SUPABASE_DB_USER"],
              password=os.environ["SUPABASE_DB_PASSWORD"],
              connect_timeout=20,
          )

          conn.autocommit = True

          with conn.cursor() as cur:
              cur.execute("select now();")
              row = cur.fetchone()
              print("Supabase Postgres wakeup OK:", row[0])

          conn.close()
          PY
