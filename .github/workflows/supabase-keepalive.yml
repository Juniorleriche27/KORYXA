name: Supabase Keepalive

on:
  schedule:
    # Every 12 hours to prevent inactivity pause.
    - cron: "17 */12 * * *"
  workflow_dispatch:

jobs:
  wakeup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "psycopg2-binary==2.9.9"

      - name: Wake Supabase Postgres
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          if [ -z "${SUPABASE_DATABASE_URL}" ]; then
            echo "::error::Missing GitHub secret SUPABASE_DATABASE_URL"
            exit 1
          fi

          python - <<'PY'
          import os
          import psycopg2

          database_url = os.environ["SUPABASE_DATABASE_URL"]

          conn = psycopg2.connect(database_url, connect_timeout=20)
          conn.autocommit = True

          with conn.cursor() as cur:
              cur.execute("select now();")
              row = cur.fetchone()
              print("Supabase Postgres wakeup OK:", row[0])

          conn.close()
          PY
